name: Deploy Yapplr Video System

on:
  push:
    branches: [ feature/video-processing, main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yapplr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: yapplr-frontend/package-lock.json

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Restore .NET dependencies
      run: |
        dotnet restore Yapplr.Api
        dotnet restore Yapplr.VideoProcessor

    - name: Build .NET projects
      run: |
        dotnet build Yapplr.Api --no-restore
        dotnet build Yapplr.VideoProcessor --no-restore

    - name: Run .NET tests
      run: |
        dotnet test Yapplr.Api --no-build --verbosity normal
        dotnet test Yapplr.VideoProcessor --no-build --verbosity normal
      env:
        ConnectionStrings__DefaultConnection: Host=localhost;Database=yapplr_test;Username=postgres;Password=postgres

    - name: Install frontend dependencies
      run: |
        cd yapplr-frontend
        npm ci

    - name: Build frontend
      run: |
        cd yapplr-frontend
        npm run build

    - name: Test video processing
      run: |
        cd Yapplr.VideoProcessor
        dotnet run --no-build -- --help || true

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: [api, video-processor, frontend]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.component == 'frontend' && './yapplr-frontend' || '.' }}
        file: ${{ matrix.component == 'api' && './Yapplr.Api/Dockerfile' || matrix.component == 'video-processor' && './Yapplr.VideoProcessor/Dockerfile' || './yapplr-frontend/Dockerfile' }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/feature/video-processing' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    
    environment: staging
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy to staging
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        script: |
          cd /opt/yapplr-staging
          git pull origin feature/video-processing
          
          # Update environment
          cp .env.staging .env.production
          
          # Deploy with video system
          ./scripts/deploy-production.sh deploy
          
          # Run health checks
          sleep 30
          ./scripts/health-check.sh quick

    - name: Notify deployment
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        text: 'Yapplr Video System deployed to staging'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    
    environment: production
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy to production
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          cd /opt/yapplr
          git pull origin main
          
          # Backup before deployment
          ./scripts/backup.sh backup
          
          # Deploy with zero downtime
          ./scripts/deploy-production.sh deploy
          
          # Verify deployment
          sleep 60
          ./scripts/health-check.sh check

    - name: Rollback on failure
      if: failure()
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          cd /opt/yapplr
          echo "Deployment failed, initiating rollback..."
          
          # Get latest backup
          LATEST_BACKUP=$(ls -t backups/database_*.sql.gz | head -1 | sed 's/.*database_\(.*\)\.sql\.gz/\1/')
          
          # Rollback
          ./scripts/backup.sh restore $LATEST_BACKUP
          ./scripts/deploy-production.sh restart

    - name: Notify deployment
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        text: 'Yapplr Video System deployed to production'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
