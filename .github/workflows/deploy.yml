name: Deploy Yapplr Production System

# This workflow deploys the complete Yapplr system using docker-compose.production.yml
# Includes API, Frontend, Database, Video Processing, and all services

on:
  push:
    branches: [ main ]
    paths: [ 'Yapplr.Api/**', 'yapplr-frontend/**', 'Yapplr.VideoProcessor/**', 'docker-compose.production.yml', 'scripts/**', '.github/workflows/**' ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yapplr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: yapplr-frontend/package-lock.json

    - name: Restore .NET dependencies
      run: |
        dotnet restore Yapplr.Api
        dotnet restore Yapplr.Api.Tests
        dotnet restore Yapplr.VideoProcessor

    - name: Build .NET projects
      run: |
        dotnet build Yapplr.Api --no-restore
        dotnet build Yapplr.Api.Tests --no-restore
        dotnet build Yapplr.VideoProcessor --no-restore

    - name: Run .NET tests
      run: |
        dotnet test Yapplr.Api.Tests --no-build --verbosity normal
      env:
        ConnectionStrings__DefaultConnection: Host=localhost;Database=yapplr_test;Username=postgres;Password=postgres

    - name: Install frontend dependencies
      run: |
        cd yapplr-frontend
        npm ci

    - name: Build frontend
      run: |
        cd yapplr-frontend
        npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    # Note: Docker images will be built on the server by docker-compose
    # This reduces CI/CD time and ensures consistency with production environment
        
    - name: Debug secrets
      run: |
        echo "LINODE_HOST is set: ${{ secrets.LINODE_HOST != '' }}"
        echo "LINODE_USER is set: ${{ secrets.LINODE_USER != '' }}"
        echo "SSH key is set: ${{ secrets.LINODE_SSH_KEY != '' }}"

    - name: Deploy to Linode
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.LINODE_HOST }}
        username: ${{ secrets.LINODE_USER }}
        key: ${{ secrets.LINODE_SSH_KEY }}
        port: 22
        timeout: 60s
        envs: DATABASE_CONNECTION_STRING,JWT_SECRET_KEY,JWT_ISSUER,JWT_AUDIENCE,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,SMTP_SERVER,SMTP_PORT,SMTP_USERNAME,SMTP_PASSWORD,FROM_EMAIL,FROM_NAME,API_BASE_URL,FIREBASE_PROJECT_ID,FIREBASE_SERVICE_ACCOUNT_KEY
        script: |
          # Navigate to existing repository directory
          cd /opt/Yapplr
          git pull origin main

          # Create .env.production file with all secrets
          cat > .env.production << 'EOF'
          # Database Configuration
          DATABASE_CONNECTION_STRING=$DATABASE_CONNECTION_STRING
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD

          # JWT Configuration
          JWT_SECRET_KEY=$JWT_SECRET_KEY
          JWT_ISSUER=$JWT_ISSUER
          JWT_AUDIENCE=$JWT_AUDIENCE

          # Email Configuration
          SMTP_SERVER=$SMTP_SERVER
          SMTP_PORT=$SMTP_PORT
          SMTP_USERNAME=$SMTP_USERNAME
          SMTP_PASSWORD=$SMTP_PASSWORD
          FROM_EMAIL=$FROM_EMAIL
          FROM_NAME=$FROM_NAME

          # API Configuration
          API_BASE_URL=$API_BASE_URL

          # Firebase Configuration
          FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID
          EOF

          # Create Firebase Service Account Key as a file
          echo '$FIREBASE_SERVICE_ACCOUNT_KEY' > firebase-service-account.json

          # Run production deployment using the enhanced script
          chmod +x scripts/deploy-production.sh
          ./scripts/deploy-production.sh deploy
      env:
        DATABASE_CONNECTION_STRING: ${{ secrets.DATABASE_CONNECTION_STRING }}
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
        JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
        POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        FROM_NAME: ${{ secrets.FROM_NAME }}
        API_BASE_URL: ${{ secrets.API_BASE_URL }}
        FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

    - name: API Health Check
      run: |
        sleep 60
        curl -f ${{ secrets.API_BASE_URL }}/health || exit 1
