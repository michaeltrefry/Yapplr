version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./uploads:/var/www/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    networks:
      - yapplr-network
    restart: unless-stopped

  # Main API Service
  yapplr-api:
    build:
      context: .
      dockerfile: Yapplr.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${DATABASE_CONNECTION_STRING}
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=Yapplr.Api
      - JwtSettings__Audience=Yapplr.Client
      - JwtSettings__ExpirationInMinutes=60
      # AWS SES configuration
      - AwsSesSettings__Region=${AWS_SES_REGION}
      - AwsSesSettings__FromEmail=${AWS_SES_FROM_EMAIL}
      - AwsSesSettings__FromName=Yapplr
      - AwsSesSettings__AccessKey=${AWS_SES_ACCESS_KEY}
      - AwsSesSettings__SecretKey=${AWS_SES_SECRET_KEY}
      # SendGrid configuration
      - SendGridSettings__ApiKey=${SENDGRID_API_KEY}
      - SendGridSettings__FromEmail=${SENDGRID_FROM_EMAIL}
      - SendGridSettings__FromName=${SENDGRID_FROM_NAME}
      # Email provider selection
      - EmailProvider=${EMAIL_PROVIDER}
      # Firebase configuration (REQUIRED for notifications)
      - Firebase__ProjectId=${FIREBASE_PROJECT_ID}
      - Firebase__ServiceAccountKey=${FIREBASE_SERVICE_ACCOUNT_KEY}
      # Storage configuration
      - StorageSettings__Type=Local
      - StorageSettings__LocalPath=/app/uploads
      - StorageSettings__BaseUrl=${API_BASE_URL}/uploads
      - VideoProcessing__Enabled=true
    volumes:
      - ./uploads:/app/uploads
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - yapplr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Video Processing Service
  yapplr-video-processor:
    build:
      context: .
      dockerfile: Yapplr.VideoProcessor/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DATABASE_CONNECTION_STRING}
      - VideoProcessing__InputPath=/app/uploads/videos
      - VideoProcessing__OutputPath=/app/uploads/videos
      - VideoProcessing__ThumbnailPath=/app/uploads/thumbnails
      - VideoProcessing__TempPath=/app/uploads/temp
      - VideoProcessing__MaxConcurrentJobs=${VIDEO_MAX_CONCURRENT_JOBS:-2}
      - VideoProcessing__PollIntervalSeconds=${VIDEO_POLL_INTERVAL:-5}
      - VideoProcessing__FFmpegPath=/usr/bin/ffmpeg
      - VideoProcessing__FFprobePath=/usr/bin/ffprobe
      - VideoProcessing__Limits__MaxDurationSeconds=${VIDEO_MAX_DURATION:-300}
      - VideoProcessing__Limits__MaxFileSizeBytes=${VIDEO_MAX_SIZE:-104857600}
      - VideoProcessing__DefaultQuality__MaxWidth=${VIDEO_MAX_WIDTH:-1920}
      - VideoProcessing__DefaultQuality__MaxHeight=${VIDEO_MAX_HEIGHT:-1080}
      - VideoProcessing__DefaultQuality__VideoBitrate=${VIDEO_BITRATE:-2000k}
      - VideoProcessing__DefaultQuality__AudioBitrate=${AUDIO_BITRATE:-128k}
    depends_on:
      - postgres
      - yapplr-api
    volumes:
      - ./uploads:/app/uploads
    networks:
      - yapplr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ffmpeg", "-version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Frontend Service
  yapplr-frontend:
    build:
      context: ./yapplr-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.yapplr.com
        - NEXT_PUBLIC_WS_URL=wss://api.yapplr.com
        # Notification provider configuration (SignalR-only for production web)
        - NEXT_PUBLIC_ENABLE_SIGNALR=true
        # Force rebuild by passing current timestamp
        - CACHE_BUST=${CACHE_BUST:-$(date +%s)}
    environment:
      - NODE_ENV=production
    networks:
      - yapplr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "https://api.yapplr.com/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    command: certbot certonly --manual --preferred-challenges=dns --email ${CERTBOT_EMAIL} --server https://acme-v02.api.letsencrypt.org/directory --agree-tos -d ${CERTBOT_DOMAIN} -d yapplr.com

networks:
  yapplr-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
