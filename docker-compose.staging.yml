version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./uploads:/var/www/uploads:ro
    depends_on:
      - yapplr-api
      - yapplr-frontend
    networks:
      - yapplr-network
    restart: unless-stopped

  # Main API Service
  yapplr-api:
    build:
      context: .
      dockerfile: Yapplr.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - EmailSettings__Provider=${EMAIL_PROVIDER}
      - EmailSettings__SendGrid__ApiKey=${SENDGRID_API_KEY}
      - EmailSettings__SendGrid__FromEmail=${SENDGRID_FROM_EMAIL}
      - EmailSettings__SendGrid__FromName=${SENDGRID_FROM_NAME}
      - StorageSettings__Type=Local
      - StorageSettings__LocalPath=/app/uploads
      - StorageSettings__BaseUrl=${API_BASE_URL}/uploads
      - VideoProcessing__Enabled=true
      # Firebase configuration (REQUIRED for notifications)
      - Firebase__ProjectId=${FIREBASE_PROJECT_ID}
    depends_on:
      - postgres
    volumes:
      - ./uploads:/app/uploads
      - ./logs/api:/app/logs
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    networks:
      - yapplr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Video Processing Service
  yapplr-video-processor:
    build:
      context: .
      dockerfile: Yapplr.VideoProcessor/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - VideoProcessing__InputPath=/app/uploads/videos
      - VideoProcessing__OutputPath=/app/uploads/videos
      - VideoProcessing__ThumbnailPath=/app/uploads/thumbnails
      - VideoProcessing__TempPath=/app/uploads/temp
      - VideoProcessing__MaxConcurrentJobs=${VIDEO_MAX_CONCURRENT_JOBS:-2}
      - VideoProcessing__PollIntervalSeconds=${VIDEO_POLL_INTERVAL:-5}
      - VideoProcessing__FFmpegPath=/usr/bin/ffmpeg
      - VideoProcessing__FFprobePath=/usr/bin/ffprobe
      - VideoProcessing__Limits__MaxDurationSeconds=${VIDEO_MAX_DURATION:-300}
      - VideoProcessing__Limits__MaxFileSizeBytes=${VIDEO_MAX_SIZE:-104857600}
      - VideoProcessing__DefaultQuality__MaxWidth=${VIDEO_MAX_WIDTH:-1920}
      - VideoProcessing__DefaultQuality__MaxHeight=${VIDEO_MAX_HEIGHT:-1080}
      - VideoProcessing__DefaultQuality__VideoBitrate=${VIDEO_BITRATE:-2000k}
      - VideoProcessing__DefaultQuality__AudioBitrate=${AUDIO_BITRATE:-128k}
    depends_on:
      - postgres
      - yapplr-api
    volumes:
      - ./uploads:/app/uploads
      - ./logs/video-processor:/app/logs
    networks:
      - yapplr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ffmpeg", "-version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Frontend Service
  yapplr-frontend:
    build:
      context: ./yapplr-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${API_BASE_URL}
        - NEXT_PUBLIC_WS_URL=${WS_BASE_URL}
        - CACHE_BUST=${CACHE_BUST:-1}
    environment:
      - NODE_ENV=production
    networks:
      - yapplr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database (LOCAL FOR STAGING)
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"  # Expose for debugging/admin access
    networks:
      - yapplr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local

networks:
  yapplr-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
